# Nimbus Forge — Render Configuration
services:
  - type: web
    name: nimbus-starter
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PORT
        value: "3000"
      - key: APP_ENV
        value: production
