<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Status}} {{.Title}}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; padding: 1.5rem; }
    .card { max-width: 36rem; width: 100%; background: #1e293b; border-radius: 12px; padding: 2rem; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,.45); }
    .code { font-size: 4rem; font-weight: 800; line-height: 1; color: #f59e0b; margin-bottom: 0.5rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; font-weight: 600; }
    p { margin: 0 0 1rem; color: #94a3b8; line-height: 1.5; }
    .id { font-family: ui-monospace, monospace; font-size: 0.85rem; background: #0f172a; padding: 0.35rem 0.6rem; border-radius: 6px; color: #fcd34d; word-break: break-all; }
    ul { margin: 0; padding-left: 1.2rem; color: #cbd5e1; }
    li { margin: 0.35rem 0; }
    .field { font-weight: 600; color: #f1f5f9; }
    footer { margin-top: 1.5rem; font-size: 0.75rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">{{.Status}}</div>
    <h1>{{.Title}}</h1>
    {{if .Message}}<p>{{.Message}}{{if .ErrorID}} <span class="id">{{.ErrorID}}</span>{{end}}</p>
    {{else if .ErrorID}}<p>Reference: <span class="id">{{.ErrorID}}</span></p>{{end}}
    {{if .Validation}}
    <ul>
      {{range $field, $errs := .Validation}}
        {{range $errs}}<li><span class="field">{{$field}}</span>: {{.}}</li>{{end}}
      {{end}}
    </ul>
    {{end}}
    <footer>Nimbus</footer>
  </div>
</body>
</html>
